<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kakao Map Test</title>
<style>
  body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;color:#111;}
  main{max-width:960px;margin:0 auto;padding:40px 20px;}
  h1{font-size:28px;margin:0 0 10px;}
  p{line-height:1.7;color:#555;}
  #map{width:100%;height:520px;border:1px solid #ddd;background:#eee;}
  #status{margin-top:14px;padding:14px 16px;border:1px solid #ddd;background:#fff;white-space:pre-wrap;font-size:14px;line-height:1.6;}
</style>
</head>
<body>
<main>
  <h1>카카오맵 단독 테스트</h1>
  <p>이 페이지는 다른 사이트 스크립트 없이 카카오 공식 샘플 방식만 사용합니다.</p>
  <div id="map"></div>
  <div id="status">지도 초기화 대기 중</div>
</main>

<script>
  (function(){
    var APP_KEY='9b6dfb7d0a394c5ee063a0cfd473c681';
    var status=document.getElementById('status');
    var container=document.getElementById('map');
    var sdkUrl='https://dapi.kakao.com/v2/maps/sdk.js?appkey='+APP_KEY+'&autoload=false';

    window.onerror=function(message,source,lineno,colno,error){
      status.textContent='브라우저 오류\n'+message+'\n'+source+':'+lineno+':'+colno;
      if(error&&error.stack){status.textContent+='\n'+error.stack;}
    };

    function drawMap(){
      if(!window.kakao){
        status.textContent='SDK onload 후에도 window.kakao 없음\n앱키 종류 또는 도메인 등록 확인 필요';
        return;
      }
      if(!kakao.maps||!kakao.maps.load){
        status.textContent='kakao.maps.load 없음\nSDK가 불완전하게 로드됨';
        return;
      }
      status.textContent='SDK 로드 성공\nkakao.maps.load 실행 중';
      kakao.maps.load(function(){
        if(!kakao.maps.Map){
          status.textContent='kakao.maps.Map 없음\nJavaScript 키 또는 웹 도메인 등록 확인 필요';
          return;
        }
        var position=new kakao.maps.LatLng(37.54639,127.05102);
        var options={
          center:position,
          level:3
        };
        var map=new kakao.maps.Map(container,options);
        var marker=new kakao.maps.Marker({
          position:position,
          map:map,
          title:'J&H그룹'
        });
        var infowindow=new kakao.maps.InfoWindow({
          content:'<div style="padding:8px 12px;font-size:13px;font-weight:700;white-space:nowrap;">J&H그룹</div>'
        });
        infowindow.open(map,marker);
        status.textContent='지도 생성 성공\norigin: '+location.origin+'\n카카오 콘솔 웹 도메인: '+location.origin;
      });
    }

    status.textContent='SDK 스크립트 삽입 중\n'+sdkUrl;
    var script=document.createElement('script');
    var settled=false;
    script.src=sdkUrl;
    script.async=true;
    script.onload=function(){
      settled=true;
      drawMap();
    };
    script.onerror=function(event){
      settled=true;
      status.textContent='SDK script onerror 발생\n브라우저가 dapi.kakao.com 스크립트를 받지 못했습니다.\n확인: 앱키가 JavaScript 키인지, 웹 도메인이 '+location.origin+' 으로 등록됐는지, 사내/브라우저 차단이 있는지';
    };
    document.head.appendChild(script);
    setTimeout(function(){
      if(!settled){
        status.textContent='SDK 로드 타임아웃\n브라우저 네트워크에서 dapi.kakao.com 요청이 막히거나 지연 중입니다.\n등록해야 하는 웹 도메인: '+location.origin;
      }
    },8000);
  })();
</script>
</body>
</html>
